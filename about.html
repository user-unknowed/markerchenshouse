<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>关于 · Marker Chen 的小站</title>
  <link rel="stylesheet" href="./css/style.css" />
  <base href="./" />
  <script>
    (function () {
      try {
        var t = localStorage.getItem('blog-theme') || 'light';
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div id="site-header"></div>

  <main class="container">
    <section class="about-hero">
      <div class="avatar" id="avatar">M</div>
      <h1 class="about-name" id="about-name">陈尹涛 / Marker Chen</h1>
      <p class="about-bio" id="about-bio">
        嗨，我是 <b>Marker Chen</b>，常被叫做 <b>陈尹涛</b>。<br />
        爱读书、爱写代码，尤其喜欢 <b>vibe coding</b> —— 跟着感觉走，让代码自然生长。<br />
        这里是我记录想法、做项目和偶尔发呆的地方。
      </p>
    </section>

    <section class="about-section">
      <h2>爱好</h2>
      <div class="skill-list" id="hobby-list"></div>
    </section>

    <section class="about-section">
      <h2>正在做的项目</h2>
      <div class="contact-list" id="project-list"></div>
    </section>

    <section class="about-section">
      <h2>社交媒体</h2>
      <div class="social-links" id="social-links"></div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="./js/app.js"></script>
  <script>
    // 关于页面信息配置
    const PROFILE = {
      name: "Marker Chen",
      bio:
        "嗨，我是 <b>Marker Chen</b>，常被叫做 <b>陈尹涛</b>。<br />" +
        "爱读书、爱写代码，尤其喜欢 <b>vibe coding</b> —— 跟着感觉走，让代码自然生长。<br />" +
        "这里是我记录想法、做项目和偶尔发呆的地方。",
      // 技能栈：复用一个进度条组件来表达「爱好 / 关注度」
      skills: [
        { name: "读书",       level: 92 },
        { name: "编程",       level: 88 },
        { name: "Vibe Coding",level: 85 },
        { name: "写随笔",     level: 70 },
        { name: "折腾工具",   level: 78 },
      ],
      // 联系方式 + 项目（共用卡片样式）
      contacts: [
        { icon: "github",  label: "StarIsle · 我的小岛项目",  href: "https://github.com/user-unknowed/-StarIsle-" },
        { icon: "github",  label: "reading--note · 读书笔记", href: "https://github.com/user-unknowed/reading--note" },
        { icon: "mail",    label: "wassup666666@qq.com",    href: "mailto:wassup666666@qq.com" },
      ],
      socials: [
        { icon: "github",  href: "https://github.com/user-unknowed", label: "GitHub" },
        { icon: "email",   href: "mailto:wassup666666@qq.com",          label: "邮箱" },
      ],
    };

    // 简单的 SVG icon 库（避免外部资源依赖）
    const ICONS = {
      mail: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>',
      location: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>',

      twitter: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 5.92c-.74.33-1.54.55-2.36.65a4.12 4.12 0 0 0 1.81-2.27 8.2 8.2 0 0 1-2.6.99 4.1 4.1 0 0 0-7 3.74A11.63 11.63 0 0 1 3.4 4.7a4.1 4.1 0 0 0 1.27 5.47 4.1 4.1 0 0 1-1.86-.51v.05a4.1 4.1 0 0 0 3.29 4.02 4.1 4.1 0 0 1-1.85.07 4.1 4.1 0 0 0 3.83 2.85A8.23 8.23 0 0 1 2 18.4a11.6 11.6 0 0 0 6.29 1.84c7.55 0 11.68-6.25 11.68-11.68 0-.18-.01-.35-.02-.53A8.36 8.36 0 0 0 22 5.92z"/></svg>',
      weibo: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M10.1 19.4c-3.8.4-7-1-7.2-3.2-.3-2.1 2.5-4.2 6.2-4.5 3.7-.4 7 1 7.2 3.1.2 2.2-2.5 4.3-6.2 4.6zm.3-6c-2.5.3-4.4 1.9-4.2 3.7.2 1.7 2.4 2.9 4.9 2.7 2.5-.3 4.4-1.9 4.2-3.6-.2-1.8-2.4-3-4.9-2.8zM18 9.5c-.6.2-1 .8-.9 1.4.1.6.7 1 1.3.8.6-.1 1-.7.9-1.3-.1-.7-.7-1-1.3-.9zm1.3-3.4c-1.5-.7-3.2-.5-4.3.4-.4.3-.4.9-.1 1.2.3.4.8.5 1.2.2.6-.5 1.6-.6 2.5-.2.9.4 1.5 1.3 1.4 2.3 0 .5.3.9.8.9.5.1.9-.3 1-.8.1-1.6-.8-3.3-2.5-4z"/></svg>',
      zhihu: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 4h14a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1zm2.5 5h2v2.2c.5-.4 1.2-.7 2-.7 1.7 0 2.7 1.1 2.7 2.9V18h-2v-4.1c0-.9-.4-1.4-1.2-1.4-.9 0-1.5.6-1.5 1.6V18h-2V9zm9.4 0h2v1.2c.4-.9 1.1-1.4 2-1.4 1.1 0 1.9.6 2.2 1.6.4-1 1.2-1.6 2.3-1.6 1.6 0 2.5 1.1 2.5 2.9V18h-2v-4.1c0-.9-.4-1.4-1.1-1.4-.8 0-1.3.6-1.3 1.6V18h-2v-4.1c0-.9-.4-1.4-1.1-1.4-.8 0-1.3.6-1.3 1.6V18h-2V9z"/></svg>',
      email: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>',
    };

    (function init() {
      Blog.applyTheme(Blog.getSavedTheme());
      Blog.renderHeader();
      Blog.renderFooter();

      // 头像首字母
      document.getElementById("avatar").textContent = (PROFILE.name || "B").charAt(0).toUpperCase();
      document.getElementById("about-name").textContent = PROFILE.name;
      document.getElementById("about-bio").innerHTML = PROFILE.bio;

      // 爱好（复用进度条组件）
      const hobbyList = document.getElementById("hobby-list");
      hobbyList.innerHTML = PROFILE.skills
        .map(
          (s) => `
            <div class="skill-row">
              <div class="skill-name">${Blog.escapeHtml(s.name)}</div>
              <div class="skill-bar"><div class="skill-fill" style="width:0%" data-target="${s.level}"></div></div>
              <div class="skill-percent">${s.level}%</div>
            </div>`
        )
        .join("");
      // 触发进度条动画
      requestAnimationFrame(() => {
        hobbyList.querySelectorAll(".skill-fill").forEach((el) => {
          el.style.width = el.dataset.target + "%";
        });
      });

      // 正在做的项目
      document.getElementById("project-list").innerHTML = PROFILE.contacts
        .map(
          (c) =>
            `<a class="contact-item" href="${c.href}" target="_blank" rel="noopener noreferrer">${ICONS[c.icon] || ""}<span>${Blog.escapeHtml(c.label)}</span></a>`
        )
        .join("");

      // 社交媒体
      document.getElementById("social-links").innerHTML = PROFILE.socials
        .map(
          (s) =>
            `<a class="social-link" href="${s.href}" target="_blank" rel="noopener noreferrer" title="${Blog.escapeHtml(s.label)}" aria-label="${Blog.escapeHtml(s.label)}">${ICONS[s.icon] || ""}</a>`
        )
        .join("");
    })();
  </script>
</body>
</html>
